# URL de conexión a la base de datos en memoria.
# jdbc:h2:mem:testdb   -> crea una BD H2 que vive solo en RAM, no en disco.
# MODE=PostgreSQL      -> hace que H2 simule el comportamiento de Postgres
#                         (tu BD real en producción), para que los tests
#                         se comporten lo más parecido posible a producción.
# DB_CLOSE_DELAY=-1    -> mantiene la BD viva mientras la JVM esté corriendo,
#                         si no, H2 la borra en cuanto se cierra la primera conexión.
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1

# Le dice a Spring qué driver JDBC usar para conectarse: el de H2,
# no el de Postgres (postgresql.Driver) que se usa en producción.
spring.datasource.driver-class-name=org.h2.Driver

# Usuario de conexión. H2 en memoria no tiene autenticación real,
# "sa" es el usuario por defecto que trae H2 de fábrica.
spring.datasource.username=sa

# Contraseña de conexión. Vacía porque H2 en memoria no la exige.
spring.datasource.password=

# Le dice a Hibernate que cree todas las tablas (a partir de tus @Entity)
# al arrancar el contexto de test, y las elimine al terminar.
# Así cada corrida de tests empieza con una BD limpia, sin datos residuales
# de la corrida anterior.
spring.jpa.hibernate.ddl-auto=create-drop

# Le indica a Hibernate qué dialecto SQL generar al crear las tablas
# y ejecutar las queries — el dialecto de H2, para que el SQL generado
# sea compatible con este motor y no con Postgres.
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Evita que Hibernate imprima cada SQL ejecutado en la consola durante
# los tests. Lo apagamos para mantener los logs de test limpios y
# fáciles de leer cuando algo falla.
spring.jpa.show-sql=false

# Límite máximo de conexiones simultáneas que mantiene el pool (HikariCP).
# En tests no necesitas muchas, así que lo dejamos bajo a propósito:
# evita que un test mal cerrado sature recursos y ayuda a detectar
# fugas de conexión más rápido.
spring.datasource.hikari.maximum-pool-size=5

# Secreto usado para firmar/verificar los JWT durante los tests.
# Es un valor fijo y de mentira — nunca debe ser el secreto real de producción,
# pero tiene que existir porque el código de seguridad lo necesita para arrancar.
security.jwt.secret=clave_super_secreta_para_tests_12345678901234567890

# Tiempo de expiración del JWT en milisegundos durante los tests
# (86400000 ms = 24 horas). Suficientemente largo para que ningún test
# falle por un token vencido a mitad de la ejecución.
security.jwt.expiration=86400000

# Correo del usuario administrador que se siembra/usa en los tests
# que necesitan loguearse como admin (en vez de crear uno por cada test).
app.admin.email=test@test.com

# Contraseña de ese mismo usuario administrador de prueba.
app.admin.password=123456

# Llave falsa de OpenAI. Existe solo para que el contexto de Spring
# arranque sin reclamar una variable de entorno faltante — en los tests
# que tocan IA, el servicio real se mockea (@MockBean), así que esta
# llave nunca se usa para llamar a la API de verdad.
OPENAI_API_KEY=dummy-key-for-tests

# Mismo propósito que la anterior, pero como propiedad de Spring AI
# en vez de variable de entorno — algunas partes del código pueden
# leer una u otra según cómo esté inyectada.
spring.ai.openai.api-key=dummy-key-for-tests